<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PawHelp 🐾</title>

<style>
body{
  margin:0;
  background:black;
  font-family:sans-serif;
  overflow-y:scroll;
}

.video-container{
  position:relative;
  height:100vh;
  width:100%;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  bottom:20px;
  left:15px;
  color:white;
}

.progress{
  background:rgba(255,255,255,0.3);
  height:6px;
  border-radius:10px;
  margin-top:5px;
  width:200px;
}

.bar{
  background:#FFB6C1;
  height:6px;
  width:0%;
  border-radius:10px;
}

.button{
  position:absolute;
  right:15px;
  bottom:80px;
  background:#D6F0FF;
  border:none;
  padding:12px;
  border-radius:50%;
  font-size:18px;
}
</style>

</head>

<body>

<!-- VIDEO 1 -->
<div class="video-container">
  <video autoplay muted loop>
<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>

<div class="overlay">
  <p style="font-size:14px; opacity:0.8;">@maria_ayuda</p>
  <h3>🐱 Gatito enfermo</h3>
  <p id="money1">S/ 0 / S/ 100</p>

    <div class="progress">
      <div id="bar1" class="bar"></div>
    </div>
  </div>

  <button class="button" onclick="verAnuncio(1)">📺</button>
<button class="button" style="bottom:140px; background:#FFD6E0;" onclick="like(1)">❤️</button>
<p id="likes1" style="position:absolute; right:20px; bottom:110px; color:white;">0</p>

<!-- VIDEO 2 -->
<div class="video-container">
  <video autoplay muted loop>
    <<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <p style="font-size:14px; opacity:0.8;">@rescate_peludo</p>
    <p id="money2">S/ 0 / S/ 80</p>

    <div class="progress">
      <div id="bar2" class="bar"></div>
    </div>
  </div>

<button class="button" onclick="verAnuncio(2)">📺</button>
<button class="button" style="bottom:140px; background:#FFD6E0;" onclick="like(2)">❤️</button>
<p id="likes2" style="position:absolute; right:20px; bottom:110px; color:white;">0</p>
</div>

<script>
let dinero = [0,0];
let metas = [100,80];
let likes = [0,0];

function verAnuncio(i){
  alert("Viendo anuncio 🐾");

  setTimeout(()=>{
    dinero[i-1] += 1;

    document.getElementById("money"+i).innerText =
      "S/ " + dinero[i-1] + " / S/ " + metas[i-1];

    let porcentaje = (dinero[i-1]/metas[i-1])*100;
    document.getElementById("bar"+i).style.width = porcentaje + "%";

    alert("Gracias por ayudar 💛");
  },1000);
}

function like(i){
  likes[i-1]++;
  document.getElementById("likes"+i).innerText = likes[i-1];
}
</script>

</body>
</html>
